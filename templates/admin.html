{% extends "base.html" %}
{% block title %}Admin{% endblock %}
{% block content %}
<div class="card-shell p-4 mb-3">
  <h2 class="h4">Admin Page</h2>
  <p class="mb-0 text-secondary">Scooter status maintenance and weekly revenue summary.</p>
</div>

<div class="row g-3">
  <div class="col-12 col-lg-6">
    <div class="card-shell p-4 h-100">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="h5 mb-0">Scooter List</h3>
        <button id="loadScootersBtn" class="btn btn-sm btn-outline-dark">Refresh</button>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-12 col-md-4">
          <input id="editScooterId" class="form-control" type="number" min="1" placeholder="scooter_id" />
        </div>
        <div class="col-12 col-md-4">
          <select id="editStatus" class="form-select">
            <option value="available">available</option>
            <option value="in_use">in_use</option>
            <option value="maintenance">maintenance</option>
          </select>
        </div>
        <div class="col-12 col-md-4">
          <button id="updateScooterBtn" class="btn btn-dark w-100">Update Status</button>
        </div>
      </div>
      <pre id="scootersBox" class="result-box">Waiting for query...</pre>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="card-shell p-4 h-100">
      <h3 class="h5">Weekly Revenue</h3>
      <div class="mb-3">
        <input id="weekStart" class="form-control" type="date" />
      </div>
      <button id="loadRevenueBtn" class="btn btn-dark w-100">Query Weekly Revenue</button>
      <button id="logoutBtn" class="btn btn-outline-secondary w-100 mt-2">Logout</button>
      <pre id="revenueBox" class="result-box mt-3">Waiting for query...</pre>
    </div>
  </div>
</div>

<script>
  async function renderResponse(box, res) {
    const data = await res.json();
    box.textContent = JSON.stringify({ status: res.status, data }, null, 2);
  }

  document.getElementById("loadScootersBtn").addEventListener("click", async () => {
    const box = document.getElementById("scootersBox");
    box.textContent = "Loading...";
    const res = await fetch("/api/admin/scooters");
    await renderResponse(box, res);
  });

  document.getElementById("updateScooterBtn").addEventListener("click", async () => {
    const box = document.getElementById("scootersBox");
    box.textContent = "Loading...";
    const scooterId = Number(document.getElementById("editScooterId").value);
    const status = document.getElementById("editStatus").value;
    const res = await fetch(`/api/admin/scooters/${scooterId}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status }),
    });
    await renderResponse(box, res);
  });

  document.getElementById("loadRevenueBtn").addEventListener("click", async () => {
    const box = document.getElementById("revenueBox");
    box.textContent = "Loading...";
    const weekStart = document.getElementById("weekStart").value;
    const url = weekStart ? `/api/admin/revenue/weekly?week_start=${weekStart}` : "/api/admin/revenue/weekly";
    const res = await fetch(url);
    await renderResponse(box, res);
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await fetch("/api/auth/logout", { method: "POST" });
    window.location.href = "/customer/login";
  });
</script>
{% endblock %}
