{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<!-- Centered login form with inline error feedback. -->
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card-shell p-4 p-md-5">
      <h2 class="h4 mb-3">Login</h2>
      <p class="muted-note mb-3">Sign in to continue to your dashboard.</p>

      <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

      <div class="mb-2">
        <label class="form-label">Email</label>
        <input id="loginEmail" class="form-control" type="email" placeholder="email" />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="loginPassword" class="form-control" type="password" placeholder="password" />
      </div>
      <div class="d-grid gap-2">
        <button id="loginBtn" class="btn btn-primary" type="button">Login</button>
        <a class="btn btn-outline-success" href="/customer/register">Create Account</a>
      </div>
      <p class="small text-secondary mt-3 mb-0">Admin demo: manager@example.com / admin123</p>
      <p class="small text-secondary mb-0">Customer demo: demo_user@example.com / 123456</p>
    </div>
  </div>
</div>

<script>
  // Submit login form and redirect by role on success.
  async function doLogin() {
    const errorBox = document.getElementById("loginError");
    errorBox.classList.add("d-none");
    errorBox.textContent = "";

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    try {
      const data = await apiRequest("/api/auth/login", {
        method: "POST",
        json: { email, password },
        suppress401Redirect: true,
      });
      if (data.user && data.user.role === "admin") {
        window.location.href = "/admin";
      } else {
        window.location.href = "/customer/dashboard";
      }
    } catch (err) {
      errorBox.textContent = err.message || "Login failed.";
      errorBox.classList.remove("d-none");
    }
  }

  // Bind button and Enter key submission handlers.
  document.getElementById("loginBtn").addEventListener("click", doLogin);
  document.getElementById("loginPassword").addEventListener("keydown", (event) => {
    if (event.key === "Enter") doLogin();
  });
</script>
{% endblock %}
