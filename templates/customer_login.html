{% extends "base.html" %}
{% block title %}Customer Login{% endblock %}
{% block content %}
<div class="card-shell p-4 p-md-5">
  <h2 class="h4 mb-3">Login</h2>
  <div class="mb-2">
    <input id="loginEmail" class="form-control" type="email" placeholder="email" />
  </div>
  <div class="mb-3">
    <input id="loginPassword" class="form-control" type="password" placeholder="password" />
  </div>
  <div class="d-flex gap-2 flex-wrap">
    <button id="loginBtn" class="btn btn-primary">Login</button>
    <a class="btn btn-outline-success" href="/customer/register">Create account</a>
  </div>
  <p class="small text-secondary mt-3 mb-0">Admin demo: manager@example.com / admin123</p>
  <p class="small text-secondary mb-0">Customer demo: demo_user@example.com / 123456</p>
</div>

<pre id="loginResult" class="result-box mt-3">Waiting for action...</pre>

<script>
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const box = document.getElementById("loginResult");
    box.textContent = "Loading...";

    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    box.textContent = JSON.stringify({ status: res.status, data }, null, 2);

    if (res.ok) {
      if (data.user && data.user.role === "admin") {
        window.location.href = "/admin";
      } else {
        window.location.href = "/customer/dashboard";
      }
    }
  });
</script>
{% endblock %}
