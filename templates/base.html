<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Hire e-scooters{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Hire e-scooters</a>
        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-sm btn-outline-success" href="/customer/register">Register</a>
          <a class="btn btn-sm btn-outline-primary" href="/customer/login">Login</a>
          <a class="btn btn-sm btn-outline-dark" href="/admin">Admin</a>
        </div>
      </div>
    </nav>
    <main class="container py-4">{% block content %}{% endblock %}</main>
  </body>
</html>
