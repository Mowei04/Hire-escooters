{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<!-- Centered registration form with inline success/error alerts. -->
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card-shell p-4 p-md-5">
      <h2 class="h4 mb-3">Create Account</h2>
      <p class="muted-note mb-3">Register as a customer with a unique username and email.</p>

      <div id="registerError" class="alert alert-danger d-none" role="alert"></div>
      <div id="registerSuccess" class="alert alert-success d-none" role="alert"></div>

      <div class="mb-2">
        <label class="form-label">Username</label>
        <input id="regUsername" class="form-control" type="text" placeholder="username" />
      </div>
      <div class="mb-2">
        <label class="form-label">Email</label>
        <input id="regEmail" class="form-control" type="email" placeholder="email" />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="regPassword" class="form-control" type="password" placeholder="password" />
      </div>
      <div class="d-grid gap-2">
        <button id="registerBtn" class="btn btn-success" type="button">Register</button>
        <a class="btn btn-outline-primary" href="/customer/login">Already have an account? Login</a>
      </div>
    </div>
  </div>
</div>

<script>
  // Submit registration form and redirect to login on success.
  async function doRegister() {
    const errorBox = document.getElementById("registerError");
    const successBox = document.getElementById("registerSuccess");
    errorBox.classList.add("d-none");
    successBox.classList.add("d-none");

    const username = document.getElementById("regUsername").value;
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;

    try {
      await apiRequest("/api/auth/register", {
        method: "POST",
        json: { username, email, password },
        suppress401Redirect: true,
      });
      successBox.textContent = "Registration successful. Redirecting to login...";
      successBox.classList.remove("d-none");
      setTimeout(() => {
        window.location.href = "/customer/login";
      }, 700);
    } catch (err) {
      errorBox.textContent = err.message || "Registration failed.";
      errorBox.classList.remove("d-none");
    }
  }

  // Bind button and Enter key submission handlers.
  document.getElementById("registerBtn").addEventListener("click", doRegister);
  document.getElementById("regPassword").addEventListener("keydown", (event) => {
    if (event.key === "Enter") doRegister();
  });
</script>
{% endblock %}
